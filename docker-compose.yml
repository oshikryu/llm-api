services:
  llama-server-1:
    build: ./llama-server
    volumes:
      - ~/projects/models:/models:ro
    command: ${LLAMA_CMD}

  llama-server-2:
    build: ./llama-server
    volumes:
      - ~/projects/models:/models:ro
    command: ${LLAMA_CMD}

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llama-server-1
      - llama-server-2

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLAMA_SERVER_URL=http://nginx:8080
      - LLAMA_PARALLEL_SLOTS=8
      - REDIS_URL=redis://redis:6379
    depends_on:
      - nginx
      - redis

  worker:
    build: .
    command: ["arq", "queue_worker.WorkerSettings"]
    environment:
      - LLAMA_SERVER_URL=http://nginx:8080
      - LLAMA_PARALLEL_SLOTS=8
      - REDIS_URL=redis://redis:6379
    depends_on:
      - nginx
      - redis
